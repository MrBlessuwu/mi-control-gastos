<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DuoFinanzas: Mundos de Color</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background-color 0.5s ease, color 0.5s ease;
            padding-top: 100px;
            padding-bottom: 100px;
        }

        /* Mundos de Color (Fondo de toda la página) */
        .theme-roger { background-color: #e0f2fe; color: #0369a1; } /* Azul Pastel */
        .theme-marian { background-color: #fdf2f8; color: #9d174d; } /* Rosa Pastel */
        .theme-negocio { background-color: #fef9c3; color: #854d0e; } /* Amarillo Pastel */

        .nav-fixed-top {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .digital-clock {
            font-family: 'JetBrains Mono', monospace;
            background: #1a202c;
            color: #4fd1c5;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 1.2rem;
            box-shadow: inset 0 0 10px #000;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); 
            border-radius: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        .view { display: none; }
        .view.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        details summary { list-style: none; outline: none; }
        details summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="theme-roger">

    <header class="nav-fixed-top p-3 flex justify-between items-center">
        <div class="flex flex-col">
            <div id="digital-clock" class="digital-clock">00:00:00 AM</div>
            <p id="txt-fecha-top" class="text-[9px] font-black uppercase mt-1 opacity-60"></p>
        </div>
        <div class="flex gap-2 bg-black/10 p-1 rounded-full">
            <button onclick="switchUser('roger')" class="w-10 h-10 rounded-full bg-blue-500 text-white font-black border-2 border-white shadow-sm">R</button>
            <button onclick="switchUser('marian')" class="w-10 h-10 rounded-full bg-pink-500 text-white font-black border-2 border-white shadow-sm">M</button>
            <button onclick="switchUser('negocio')" class="w-10 h-10 rounded-full bg-yellow-500 text-white font-black border-2 border-white shadow-sm">N</button>
        </div>
    </header>

    <main id="view-home" class="view active max-w-md mx-auto p-4 space-y-4">
        
        <div class="glass-card p-8 text-center relative overflow-hidden">
            <h1 id="label-perfil" class="text-[10px] font-black uppercase tracking-[0.2em] mb-2 opacity-50">Roger's World</h1>
            <p id="val-semanal" class="text-5xl font-black mb-4">Q0.00</p>
            <div class="flex justify-around items-center border-t border-black/5 pt-4">
                <div>
                    <span class="block text-[9px] font-bold opacity-40 uppercase">Ahorro</span>
                    <span id="val-ahorro" class="font-bold text-lg">Q0.00</span>
                </div>
                <div class="h-8 w-px bg-black/10"></div>
                <div>
                    <span class="block text-[9px] font-bold opacity-40 uppercase">Gasto Hoy</span>
                    <span id="val-hoy" class="font-bold text-lg text-red-500">Q0.00</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="quickAction(2, 'Viaje Transmetro')" class="glass-card p-5 flex flex-col items-center active:scale-90 transition-transform">
                <span class="text-3xl">🚇</span>
                <span class="text-[10px] font-black uppercase mt-1">Viaje Q2</span>
            </button>
            <button onclick="quickAction(5, 'Recarga Tarjeta')" class="glass-card p-5 flex flex-col items-center active:scale-90 transition-transform">
                <span class="text-3xl">💳</span>
                <span class="text-[10px] font-black uppercase mt-1">Recarga Q5</span>
            </button>
        </div>

        <div class="space-y-3">
            <details class="glass-card overflow-hidden group">
                <summary class="p-5 font-black text-sm flex justify-between items-center cursor-pointer">
                    <span><i class="fa-solid fa-file-invoice-dollar mr-2"></i> Movimiento Manual</span>
                    <i class="fa-solid fa-chevron-down text-xs transition-transform group-open:rotate-180"></i>
                </summary>
                <div class="p-5 pt-0 space-y-3 border-t border-black/5 mt-2">
                    <input type="number" id="in-monto" placeholder="Q 0.00" class="w-full text-3xl font-black text-center bg-transparent border-b-2 border-black/10 outline-none py-2">
                    <select id="in-tipo" class="w-full p-4 rounded-2xl bg-white/50 font-bold text-sm">
                        <option value="gasto_semanal">➖ Gasto Semanal</option>
                        <option value="ingreso_semanal">➕ Ingreso Semanal</option>
                        <option value="ingreso_ahorro">💰 Ahorrar Dinero</option>
                        <option value="gasto_ahorro">💸 Usar Ahorro</option>
                    </select>
                    <input type="text" id="in-nota" placeholder="¿En qué lo usaste?" class="w-full p-4 rounded-2xl bg-white/50 text-sm outline-none">
                    <button onclick="execTrans()" class="w-full bg-black text-white py-4 rounded-2xl font-black shadow-lg">GUARDAR</button>
                </div>
            </details>

            <details class="glass-card overflow-hidden group">
                <summary class="p-5 font-black text-sm flex justify-between items-center cursor-pointer">
                    <span><i class="fa-solid fa-handshake mr-2"></i> Préstamos / Temu</span>
                    <i class="fa-solid fa-chevron-down text-xs transition-transform group-open:rotate-180"></i>
                </summary>
                <div class="p-5 pt-0 space-y-3 border-t border-black/5 mt-2">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="d-nom" placeholder="Nombre" class="p-3 rounded-xl bg-white/50 text-sm">
                        <input type="number" id="d-mon" placeholder="Monto Q" class="p-3 rounded-xl bg-white/50 text-sm">
                    </div>
                    <button onclick="addDeuda()" class="w-full bg-black/10 py-3 rounded-xl font-bold text-xs uppercase">Anotar Deuda</button>
                    <div id="list-deudas" class="space-y-2 mt-4 text-left"></div>
                </div>
            </details>
        </div>
    </main>

    <main id="view-calc" class="view max-w-md mx-auto p-4">
        <div class="glass-card p-6 shadow-2xl">
            <div class="bg-black/90 p-6 rounded-3xl text-right mb-4">
                <h2 id="calc-res" class="text-4xl font-black text-teal-400">0</h2>
            </div>
            <div class="grid grid-cols-4 gap-2" id="calc-grid"></div>
        </div>
    </main>

    <main id="view-hist" class="view max-w-md mx-auto p-4">
        <h2 class="text-xl font-black mb-4"><i class="fa-solid fa-clock-rotate-left mr-2"></i> Historial Reciente</h2>
        <div id="list-historial" class="space-y-3"></div>
    </main>

    <main id="view-patch" class="view max-w-md mx-auto p-4">
        <div class="glass-card p-6 border-2 border-red-100">
            <h2 class="text-xl font-black text-red-600 mb-4 tracking-tighter">🛠️ Modo Parche Manual</h2>
            <div class="space-y-4">
                <div><label class="text-[9px] font-bold ml-2">SEMANAL</label><input type="number" id="p-sem" class="w-full p-4 rounded-2xl bg-white/50 font-bold border"></div>
                <div><label class="text-[9px] font-bold ml-2">AHORRO</label><input type="number" id="p-aho" class="w-full p-4 rounded-2xl bg-white/50 font-bold border"></div>
                <div><label class="text-[9px] font-bold ml-2">GASTO HOY</label><input type="number" id="p-hoy" class="w-full p-4 rounded-2xl bg-white/50 font-bold border"></div>
                <button onclick="savePatch()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black shadow-lg">SOBRESCRIBIR TODO</button>
            </div>
            
            <div class="mt-10 pt-6 border-t border-red-200">
                <p class="text-[10px] font-bold text-center mb-4">⚠️ ACCIÓN IRREVERSIBLE ⚠️</p>
                <button onclick="clearAllHistory()" class="w-full bg-white border-2 border-red-500 text-red-500 py-3 rounded-xl font-black text-xs">BORRAR TODAS LAS TRANSACCIONES</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-4 left-4 right-4 glass-card p-3 flex justify-around items-center z-50">
        <button onclick="showView('home')" class="flex flex-col items-center text-black/40 hover:text-black"><i class="fa-solid fa-house text-xl"></i><span class="text-[8px] font-black uppercase">Home</span></button>
        <button onclick="showView('calc')" class="flex flex-col items-center text-black/40 hover:text-black"><i class="fa-solid fa-calculator text-xl"></i><span class="text-[8px] font-black uppercase">Calc</span></button>
        <button onclick="showView('hist')" class="flex flex-col items-center text-black/40 hover:text-black"><i class="fa-solid fa-receipt text-xl"></i><span class="text-[8px] font-black uppercase">Historial</span></button>
        <button onclick="showView('patch')" class="flex flex-col items-center text-black/40 hover:text-black"><i class="fa-solid fa-wrench text-xl"></i><span class="text-[8px] font-black uppercase">Parche</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc, collection, addDoc, query, orderBy, limit, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrpGejWy2Xstf_KiqkNSlfknl3HaBhyyE",
            authDomain: "finanzas-3e70d.firebaseapp.com",
            projectId: "finanzas-3e70d",
            storageBucket: "finanzas-3e70d.firebasestorage.app",
            messagingSenderId: "125350113957",
            appId: "1:125350113957:web:16e676cc72327bb158934c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let user = 'roger';
        let data = {};

        // RELOJ DIGITAL 12H
        setInterval(() => {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            document.getElementById('txt-fecha-top').innerText = now.toLocaleDateString('es-GT', { weekday: 'long', day: 'numeric', month: 'short' });
        }, 1000);

        // NAVEGACIÓN Y USUARIO
        window.switchUser = (u) => {
            user = u;
            document.body.className = `theme-${u}`;
            document.getElementById('label-perfil').innerText = u.charAt(0).toUpperCase() + u.slice(1) + "'s World";
            renderUI();
        };

        window.showView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active');
        };

        // FIREBASE SYNC
        ['roger', 'marian', 'negocio'].forEach(u => {
            onSnapshot(doc(db, "usuario", u), (s) => {
                if(s.exists()) {
                    data[u] = s.data();
                    if(u === user) renderUI();
                }
            });
        });

        function renderUI() {
            const d = data[user];
            if(!d) return;
            document.getElementById('val-semanal').innerText = `Q${d.semanal.toFixed(2)}`;
            document.getElementById('val-ahorro').innerText = `Q${d.ahorro.toFixed(2)}`;
            document.getElementById('val-hoy').innerText = `Q${d.gastosHoy.toFixed(2)}`;
            
            document.getElementById('p-sem').value = d.semanal;
            document.getElementById('p-aho').value = d.ahorro;
            document.getElementById('p-hoy').value = d.gastosHoy;
            
            fetchHistory();
            fetchDeudas();
        }

        // ACCIONES
        window.quickAction = async (m, nota) => {
            await updateDoc(doc(db, "usuario", user), { semanal: increment(-m), gastosHoy: increment(m) });
            await addDoc(collection(db, "movimientos"), {
                u: user, tipo: 'gasto', m, nota, c: 'SEMANAL', t: new Date().toISOString()
            });
        };

        window.execTrans = async () => {
            const m = parseFloat(document.getElementById('in-monto').value);
            const t = document.getElementById('in-tipo').value;
            const n = document.getElementById('in-nota').value || "Gasto vario";
            if(!m) return;

            let upd = {};
            if(t === 'gasto_semanal') upd = { semanal: increment(-m), gastosHoy: increment(m) };
            if(t === 'ingreso_semanal') upd = { semanal: increment(m) };
            if(t === 'ingreso_ahorro') upd = { ahorro: increment(m) };
            if(t === 'gasto_ahorro') upd = { ahorro: increment(-m) };

            await updateDoc(doc(db, "usuario", user), upd);
            await addDoc(collection(db, "movimientos"), {
                u: user, tipo: t.includes('gasto')?'gasto':'ingreso', m, nota: n, c: t.includes('semanal')?'SEMANAL':'AHORRO', t: new Date().toISOString()
            });
            document.getElementById('in-monto').value = ""; document.getElementById('in-nota').value = "";
        };

        window.addDeuda = async () => {
            const n = document.getElementById('d-nom').value;
            const m = parseFloat(document.getElementById('d-mon').value);
            if(!n || !m) return;
            await addDoc(collection(db, "prestamos"), { 
                u: user, nom: n, m, pagado: false, t: new Date().toLocaleDateString() 
            });
            document.getElementById('d-nom').value = ""; document.getElementById('d-mon').value = "";
        };

        function fetchDeudas() {
            onSnapshot(collection(db, "prestamos"), (s) => {
                const l = document.getElementById('list-deudas'); l.innerHTML = "";
                s.docs.forEach(docSnap => {
                    const d = docSnap.data();
                    if(d.u === user && !d.pagado) {
                        l.innerHTML += `
                            <div class="bg-white/40 p-3 rounded-2xl flex justify-between items-center shadow-sm border border-white/50">
                                <div><p class="text-xs font-black">${d.nom}</p><p class="text-[9px] opacity-40">${d.t}</p></div>
                                <div class="flex items-center gap-2">
                                    <span class="font-bold text-sm">Q${d.m}</span>
                                    <button onclick="payDeuda('${docSnap.id}', ${d.m})" class="bg-black text-white text-[9px] px-3 py-2 rounded-lg font-black">SALDAR</button>
                                </div>
                            </div>`;
                    }
                });
            });
        }

        window.payDeuda = async (id, m) => {
            if(!confirm("¿Saldar deuda de Q"+m+"? Se restará de tu semanal.")) return;
            await updateDoc(doc(db, "prestamos", id), { pagado: true });
            await updateDoc(doc(db, "usuario", user), { semanal: increment(-m), gastosHoy: increment(m) });
            await addDoc(collection(db, "movimientos"), { 
                u: user, tipo: 'gasto', m, nota: "Deuda saldada", c: 'SEMANAL', t: new Date().toISOString() 
            });
        };

        function fetchHistory() {
            const q = query(collection(db, "movimientos"), orderBy("t", "desc"), limit(20));
            onSnapshot(q, (s) => {
                const l = document.getElementById('list-historial'); l.innerHTML = "";
                s.docs.forEach(docSnap => {
                    const h = docSnap.data();
                    if(h.u !== user) return;
                    l.innerHTML += `
                        <div class="glass-card p-4 flex justify-between items-center shadow-sm border-l-4 ${h.tipo==='gasto'?'border-red-400':'border-green-400'}">
                            <div><p class="text-xs font-black uppercase tracking-tighter">${h.nota}</p><p class="text-[9px] opacity-30">${new Date(h.t).toLocaleString()}</p></div>
                            <p class="font-black ${h.tipo==='gasto'?'text-red-500':'text-green-600'}">${h.tipo==='gasto'?'-':'+'} Q${h.m.toFixed(2)}</p>
                        </div>`;
                });
            });
        }

        window.savePatch = async () => {
            const s = parseFloat(document.getElementById('p-sem').value);
            const a = parseFloat(document.getElementById('p-aho').value);
            const h = parseFloat(document.getElementById('p-hoy').value);
            await updateDoc(doc(db, "usuario", user), { semanal: s, ahorro: a, gastosHoy: h });
            alert("Sistema sincronizado ✅");
        };

        window.clearAllHistory = async () => {
            if(!confirm("¿Estás SEGURO? Se borrará todo el historial de transacciones.")) return;
            const q = query(collection(db, "movimientos"));
            const s = await getDocs(q);
            s.forEach(async (d) => await deleteDoc(doc(db, "movimientos", d.id)));
            alert("Historial borrado.");
        };

        // CALCULADORA
        const cGrid = document.getElementById('calc-grid');
        const keys = ["C", "DEL", "%", "/", "7", "8", "9", "*", "4", "5", "6", "-", "1", "2", "3", "+", "0", ".", "="];
        let cur = "";
        keys.forEach(k => {
            const b = document.createElement('button');
            b.innerText = k;
            b.className = "p-5 bg-white/50 rounded-2xl font-bold text-lg active:bg-white";
            if(k === "=") b.className = "p-5 bg-teal-400 text-black rounded-2xl font-black text-xl col-span-1";
            if(k === "C") b.className += " text-red-500";
            b.onclick = () => {
                if(k === "C") cur = "";
                else if(k === "DEL") cur = cur.slice(0, -1);
                else if(k === "=") { try { cur = eval(cur).toString(); } catch { cur = "Err"; } }
                else cur += k;
                document.getElementById('calc-res').innerText = cur || "0";
            };
            cGrid.appendChild(b);
        });

    </script>
</body>
</html>
