<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DuoFinanzas: Control Total</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');

:root {
    --accent: #3b82f6;
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: all .3s ease;
    padding-top: 100px;
    padding-bottom: 110px;
}

.theme-roger {
    background: #e0f2fe;
    --accent: #3b82f6;
}

.theme-marian {
    background: #fdf2f8;
    --accent: #ec4899;
}

.theme-negocio {
    background: #fef9c3;
    --accent: #eab308;
}

.glass-card {
    background: rgba(255,255,255,.75);
    backdrop-filter: blur(10px);
    border-radius: 2rem;
    border: 1px solid rgba(255,255,255,.5);
    box-shadow: 0 8px 20px rgba(0,0,0,.05);
}

.nav-fixed-top {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(255,255,255,.6);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,.4);
}

.digital-clock {
    font-family: 'JetBrains Mono', monospace;
    background: white;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 5px 12px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
}

.btn-main {
    background: var(--accent);
    color: white;
}

.view {
    display: none;
}

.view.active {
    display: block;
}

details summary {
    list-style: none;
}

details summary::-webkit-details-marker {
    display: none;
}

.calc-btn {
    background: rgba(255,255,255,.6);
    border-radius: 1rem;
    padding: 18px;
    font-weight: bold;
}
</style>
</head>
<body class="theme-roger">

<header class="nav-fixed-top p-3 flex justify-between items-center">

    <div>
        <div id="reloj" class="digital-clock">00:00:00</div>
        <p id="fecha" class="text-[10px] font-black opacity-50 mt-1"></p>
    </div>

    <div class="flex gap-2 bg-white/50 p-1 rounded-full shadow-inner border">
        <button onclick="cambiarUsuario('roger')" class="w-10 h-10 rounded-full bg-blue-500 text-white font-black">R</button>
        <button onclick="cambiarUsuario('marian')" class="w-10 h-10 rounded-full bg-pink-500 text-white font-black">M</button>
        <button onclick="cambiarUsuario('negocio')" class="w-10 h-10 rounded-full bg-yellow-500 text-white font-black">N</button>
    </div>

</header>

<!-- HOME -->
<main id="view-home" class="view active max-w-md mx-auto p-4 space-y-4">

    <h2 id="titulo-perfil" class="text-center uppercase tracking-widest font-black text-sm opacity-70">
        Cuentas de Roger
    </h2>

    <!-- TARJETAS -->
    <div class="grid grid-cols-2 gap-3">

        <div class="glass-card p-4">
            <p class="text-[9px] uppercase font-bold opacity-50">Semanal / Caja</p>
            <h2 id="saldo-semanal" class="text-2xl font-black">Q0.00</h2>
        </div>

        <div class="glass-card p-4">
            <p class="text-[9px] uppercase font-bold opacity-50">Ahorro</p>
            <h2 id="saldo-ahorro" class="text-2xl font-black text-blue-600">Q0.00</h2>
        </div>

        <div class="glass-card p-4 col-span-2">
            <p class="text-[9px] uppercase font-bold opacity-50">Gastos Hoy</p>
            <h2 id="gastos-hoy" class="text-2xl font-black text-red-500">Q0.00</h2>
        </div>

    </div>

    <!-- =========================
    SECCIÓN PASAJES
    ========================= -->
    <details id="seccion-pasajes" class="glass-card overflow-hidden group">
        <summary class="p-5 font-black text-sm flex justify-between items-center cursor-pointer">
            <span>🚌 Pasajes</span>
            <i class="fa-solid fa-minus text-[10px] transition-transform group-open:rotate-180"></i>
        </summary>

        <div class="p-5 pt-0">
            <!-- CONTENIDO -->
        </div>
    </details>

    <!-- =========================
    BOTONES RÁPIDOS
    ========================= -->
    <div id="acciones-rapidas" class="grid grid-cols-2 gap-3">
        
        <button onclick="accionRapida(2, 'Ida/Vuelta Transmetro')"
            class="glass-card p-4 flex flex-col items-center active:scale-95">

            <span class="text-2xl">🚇</span>

            <span class="text-[9px] font-black uppercase mt-1">
                -Q2 IDA/VUELTA
            </span>
        </button>

        <button onclick="accionRapida(5, 'Recarga Tarjeta')"
            class="glass-card p-4 flex flex-col items-center active:scale-95">

            <span class="text-2xl">💳</span>

            <span class="text-[9px] font-black uppercase mt-1">
                -Q5 RECARGA
            </span>
        </button>
    </div>

    <!-- =========================
    GASTO / INGRESO
    ========================= -->
    <details class="glass-card overflow-hidden group">
        <summary class="p-5 font-black text-sm flex justify-between items-center cursor-pointer">
            <span>💸 Gasto / Ingreso Manual</span>

            <i class="fa-solid fa-minus text-[10px] transition-transform group-open:rotate-180"></i>
        </summary>

        <div class="p-5 pt-0">
            <!-- CONTENIDO -->
        </div>
    </details>

    <!-- =========================
    PRÉSTAMOS
    ========================= -->
    <details class="glass-card overflow-hidden group">
        <summary class="p-5 font-black text-sm flex justify-between items-center cursor-pointer">
            <span>🤝 Préstamos</span>

            <i class="fa-solid fa-minus text-[10px] transition-transform group-open:rotate-180"></i>
        </summary>

        <div class="p-5 pt-0 space-y-4">

            <!-- DEUDAS CONTRA NOSOTROS -->
            <div>
                <h3 class="font-black text-xs uppercase opacity-60 mb-2">
                    Nos deben
                </h3>

                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="text" id="debe-quien"
                        placeholder="¿Quién debe?"
                        class="p-3 rounded-xl bg-white/50 text-xs">

                    <input type="number" id="debe-cuanto"
                        placeholder="Q"
                        class="p-3 rounded-xl bg-white/50 text-xs">
                </div>

                <input type="date" id="debe-fecha"
                    class="w-full p-3 rounded-xl bg-white/50 text-xs mb-2">

                <button onclick="nuevaDeudaFavor()"
                    class="w-full py-3 rounded-xl bg-green-500 text-white font-black text-[10px] uppercase">
                    Guardar préstamo a favor
                </button>
            </div>

            <!-- DEUDAS NUESTRAS -->
            <div class="pt-4 border-t border-black/5">

                <h3 class="font-black text-xs uppercase opacity-60 mb-2">
                    Debemos
                </h3>

                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="text" id="deuda-quien"
                        placeholder="¿A quién?"
                        class="p-3 rounded-xl bg-white/50 text-xs">

                    <input type="number" id="deuda-cuanto"
                        placeholder="Q"
                        class="p-3 rounded-xl bg-white/50 text-xs">
                </div>

                <input type="date" id="deuda-fecha"
                    class="w-full p-3 rounded-xl bg-white/50 text-xs mb-2">

                <button onclick="nuevaDeudaContra()"
                    class="w-full py-3 rounded-xl bg-red-500 text-white font-black text-[10px] uppercase">
                    Guardar deuda
                </button>
            </div>

            <!-- LISTAS -->
            <div id="lista-deudas" class="space-y-2 pt-4"></div>

        </div>
    </details>

    <!-- =========================
    HISTORIAL
    ========================= -->
    <details class="glass-card overflow-hidden group" open>
        <summary class="p-5 font-black text-sm flex justify-between items-center cursor-pointer">
            <span>📜 Historial General</span>

            <i class="fa-solid fa-minus text-[10px] transition-transform group-open:rotate-180"></i>
        </summary>

        <div class="p-5 pt-0">

            <!-- ENERO -->
            <div class="mb-5">
                <div class="bg-black text-white text-[10px] font-black uppercase px-3 py-2 rounded-xl inline-block mb-3">
                    Enero 2026
                </div>

                <div id="historial-enero" class="space-y-2"></div>
            </div>

            <!-- FEBRERO -->
            <div class="mb-5">
                <div class="bg-black text-white text-[10px] font-black uppercase px-3 py-2 rounded-xl inline-block mb-3">
                    Febrero 2026
                </div>

                <div id="historial-febrero" class="space-y-2"></div>
            </div>

        </div>
    </details>

    <!-- =========================
    PARCHE
    ========================= -->
    <details class="glass-card overflow-hidden group">
        <summary class="p-5 font-black text-sm flex justify-between items-center cursor-pointer">
            <span>🛠️ Parche</span>

            <i class="fa-solid fa-minus text-[10px] transition-transform group-open:rotate-180"></i>
        </summary>

        <div class="p-5 pt-0 space-y-5">

            <!-- SEMANAL -->
            <div>
                <label class="text-[10px] font-black uppercase opacity-50">
                    Corregir Semanal
                </label>

                <input type="number" id="p-sem"
                    class="w-full p-4 rounded-2xl bg-white/50 font-bold border">
            </div>

            <!-- AHORRO -->
            <div>
                <label class="text-[10px] font-black uppercase opacity-50">
                    Corregir Ahorro
                </label>

                <input type="number" id="p-aho"
                    class="w-full p-4 rounded-2xl bg-white/50 font-bold border">
            </div>

            <!-- EMERGENCIA -->
            <div>
                <label class="text-[10px] font-black uppercase opacity-50">
                    Corregir Emergencia
                </label>

                <input type="number" id="p-eme"
                    class="w-full p-4 rounded-2xl bg-white/50 font-bold border">
            </div>

            <button onclick="aplicarParche()"
                class="w-full bg-red-600 text-white py-4 rounded-2xl font-black shadow-lg">
                SOBRESCRIBIR SALDOS
            </button>

            <!-- BORRAR HISTORIAL POR MES -->
            <div class="pt-6 border-t border-black/5">

                <h3 class="text-[10px] font-black uppercase opacity-50 mb-3">
                    Borrar historial por mes
                </h3>

                <div class="grid grid-cols-2 gap-2 mb-3">

                    <select id="mes-borrar"
                        class="p-3 rounded-xl bg-white/50 text-xs">

                        <option value="0">Enero</option>
                        <option value="1">Febrero</option>
                        <option value="2">Marzo</option>
                        <option value="3">Abril</option>
                        <option value="4">Mayo</option>
                        <option value="5">Junio</option>
                        <option value="6">Julio</option>
                        <option value="7">Agosto</option>
                        <option value="8">Septiembre</option>
                        <option value="9">Octubre</option>
                        <option value="10">Noviembre</option>
                        <option value="11">Diciembre</option>

                    </select>

                    <input type="number"
                        id="anio-borrar"
                        placeholder="2026"
                        class="p-3 rounded-xl bg-white/50 text-xs">
                </div>

                <button onclick="borrarHistorialMes()"
                    class="w-full bg-black text-white py-3 rounded-xl font-black text-[10px] uppercase">

                    Borrar historial del mes
                </button>

            </div>

        </div>
    </details>

</main>

<!-- HISTORIAL -->
<main id="view-hist" class="view max-w-md mx-auto p-4">

    <h2 class="text-xl font-black mb-4">
        Historial de <span id="hist-user">Roger</span>
    </h2>

    <div id="lista-historial" class="space-y-2"></div>

</main>

<!-- CALCULADORA -->
<main id="view-calc" class="view max-w-md mx-auto p-4 space-y-4">

    <div class="glass-card p-6">

        <div class="bg-white p-6 rounded-3xl text-right mb-4 border border-black/5">
            <h2 id="calc-res" class="text-4xl font-black" style="color:var(--accent)">0</h2>
        </div>

        <div id="calc-grid" class="grid grid-cols-4 gap-2"></div>

    </div>

    <div class="glass-card p-4">

        <h3 class="font-black text-sm mb-3">Historial Calculadora</h3>

        <div id="calc-history" class="space-y-2 text-xs"></div>

    </div>

</main>

<!-- PARCHE -->
<main id="view-patch" class="view max-w-md mx-auto p-4">

    <div class="glass-card p-6 space-y-4">

        <h2 class="text-xl font-black text-red-600 uppercase">
            🛠️ Modo Corrección
        </h2>

        <input type="number" id="p-sem" placeholder="Semanal" class="w-full p-4 rounded-2xl bg-white/60 border font-bold">

        <input type="number" id="p-aho" placeholder="Ahorro" class="w-full p-4 rounded-2xl bg-white/60 border font-bold">

        <button onclick="aplicarParche()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black">
            SOBRESCRIBIR SALDOS
        </button>

    </div>

</main>

<!-- NAV -->
<nav class="fixed bottom-4 left-4 right-4 glass-card p-3 flex justify-around items-center z-50 shadow-2xl">

    <button onclick="ver('home')" class="flex flex-col items-center text-black/40">
        <i class="fa-solid fa-house text-xl"></i>
        <span class="text-[8px] font-bold uppercase">Inicio</span>
    </button>

    <button onclick="ver('calc')" class="flex flex-col items-center text-black/40">
        <i class="fa-solid fa-calculator text-xl"></i>
        <span class="text-[8px] font-bold uppercase">Calc</span>
    </button>

    <button onclick="ver('hist')" class="flex flex-col items-center text-black/40">
        <i class="fa-solid fa-clock-rotate-left text-xl"></i>
        <span class="text-[8px] font-bold uppercase">Historial</span>
    </button>

    <button onclick="ver('patch')" class="flex flex-col items-center text-black/40">
        <i class="fa-solid fa-wrench text-xl"></i>
        <span class="text-[8px] font-bold uppercase">Parche</span>
    </button>

</nav>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    doc,
    onSnapshot,
    updateDoc,
    increment,
    setDoc,
    collection,
    addDoc,
    query,
    orderBy,
    limit,
    getDocs,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_AUTH_DOMAIN",
    projectId: "TU_PROJECT_ID",
    storageBucket: "TU_BUCKET",
    messagingSenderId: "TU_SENDER_ID",
    appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let usuarioActivo = 'roger';
let datosLocales = {};
let movimientos = [];
let prestamos = [];

// RELOJ
setInterval(() => {

    const n = new Date();

    document.getElementById('reloj').innerText = n.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
    });

    document.getElementById('fecha').innerText = n.toLocaleDateString('es-GT', {
        weekday: 'long',
        day: 'numeric',
        month: 'short'
    });

}, 1000);

// USUARIOS
['roger', 'marian', 'negocio'].forEach(u => {

    onSnapshot(doc(db, 'usuario', u), snap => {

        if(snap.exists()) {
            datosLocales[u] = snap.data();
            if(u === usuarioActivo) render();
        } else {
            setDoc(doc(db, 'usuario', u), {
                semanal: 0,
                ahorro: 0,
                gastosHoy: 0
            });
        }

    });

});

// MOVIMIENTOS
const qMov = query(collection(db, 'movimientos'), orderBy('fechaIso', 'desc'), limit(50));

onSnapshot(qMov, snap => {
    movimientos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderHistorial();
});

// PRESTAMOS
onSnapshot(collection(db, 'prestamos'), snap => {
    prestamos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderPrestamos();
});

function render() {

    const d = datosLocales[usuarioActivo] || {
        semanal: 0,
        ahorro: 0,
        gastosHoy: 0
    };

    document.getElementById('saldo-semanal').innerText = `Q${(d.semanal || 0).toFixed(2)}`;

    document.getElementById('saldo-ahorro').innerText = `Q${(d.ahorro || 0).toFixed(2)}`;

    document.getElementById('gastos-hoy').innerText = `Q${(d.gastosHoy || 0).toFixed(2)}`;

    document.getElementById('p-sem').value = d.semanal || 0;
    document.getElementById('p-aho').value = d.ahorro || 0;

    document.getElementById('titulo-perfil').innerText = `Cuentas de ${usuarioActivo}`;

    document.getElementById('hist-user').innerText = usuarioActivo;

    document.body.className = `theme-${usuarioActivo}`;

    // NUEVA UI CONTROL
    actualizarUI();

}

function actualizarUI() {

    const esNegocio = usuarioActivo === 'negocio';

    const accionesRapidas = document.getElementById('acciones-rapidas');
    const seccionPasajes = document.getElementById('seccion-pasajes');

    if(accionesRapidas) accionesRapidas.style.display = esNegocio ? 'none' : 'grid';
    if(seccionPasajes) seccionPasajes.style.display = esNegocio ? 'none' : 'block';
}

window.cambiarUsuario = (u) => {
    usuarioActivo = u;
    render();
};

window.ver = (id) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${id}`).classList.add('active');
};

async function registrarHistorial(tipo, monto, detalle, cuenta) {

    await addDoc(collection(db, 'movimientos'), {
        usuario: usuarioActivo,
        tipo,
        monto,
        detalle,
        cuenta,
        fechaIso: new Date().toISOString(),
        fechaLegible: new Date().toLocaleString('es-GT')
    });

}

window.accionRapida = async (monto, detalle) => {

    await updateDoc(doc(db, 'usuario', usuarioActivo), {
        semanal: increment(-monto),
        gastosHoy: increment(monto)
    });

    await registrarHistorial('gasto', monto, detalle, 'SEMANAL');

};

window.guardarManual = async () => {

    const monto = parseFloat(document.getElementById('monto-m').value);

    if(!monto || monto <= 0) return;

    const tipo = document.getElementById('tipo-m').value;

    const nota = document.getElementById('nota-m').value || 'Gasto vario';

    let updates = {};

    if(tipo === 'gasto_semanal') {
        updates = {
            semanal: increment(-monto),
            gastosHoy: increment(monto)
        };
    }

    else if(tipo === 'ingreso_semanal') {
        updates = {
            semanal: increment(monto)
        };
    }

    else if(tipo === 'ingreso_ahorro') {
        updates = {
            ahorro: increment(monto)
        };
    }

    else if(tipo === 'gasto_ahorro') {
        updates = {
            ahorro: increment(-monto)
        };
    }

    await updateDoc(doc(db, 'usuario', usuarioActivo), updates);

    await registrarHistorial(
        tipo.includes('gasto') ? 'gasto' : 'ingreso',
        monto,
        nota,
        tipo.split('_')[1].toUpperCase()
    );

};

window.acompaniarMarian = async () => {

    const monto = parseFloat(prompt("¿Cuánto gastaron cada uno?"));

    if(!monto || monto <= 0) return;

    await updateDoc(doc(db, "usuario", "roger"), {
        semanal: increment(-monto),
        gastosHoy: increment(monto)
    });

    await updateDoc(doc(db, "usuario", "marian"), {
        semanal: increment(-monto),
        gastosHoy: increment(monto)
    });

    await registrarHistorial('gasto', monto, 'Acompañó a Marian', 'SEMANAL');

    alert("Registrado correctamente");
};

window.nuevaDeudaFavor = async () => {
    const quien = document.getElementById('debe-quien').value;
    const monto = parseFloat(document.getElementById('debe-cuanto').value);
    const fecha = document.getElementById('debe-fecha').value;

    if(!quien || !monto) return alert("Completa los datos");

    await addDoc(collection(db, 'prestamos'), {
        usuario: usuarioActivo,
        quien,
        monto,
        fecha,
        tipo: 'nosdeben',
        cuenta: 'semanal',
        pagado: false
    });

    alert("Préstamo registrado");
    document.getElementById('debe-quien').value = '';
    document.getElementById('debe-cuanto').value = '';
    document.getElementById('debe-fecha').value = '';
};

window.nuevaDeudaContra = async () => {
    const quien = document.getElementById('deuda-quien').value;
    const monto = parseFloat(document.getElementById('deuda-cuanto').value);
    const fecha = document.getElementById('deuda-fecha').value;

    if(!quien || !monto) return alert("Completa los datos");

    await addDoc(collection(db, 'prestamos'), {
        usuario: usuarioActivo,
        quien,
        monto,
        fecha,
        tipo: 'debemos',
        cuenta: 'semanal',
        pagado: false
    });

    await updateDoc(doc(db, 'usuario', usuarioActivo), {
        semanal: increment(monto)
    });

    alert("Deuda registrada");
    document.getElementById('deuda-quien').value = '';
    document.getElementById('deuda-cuanto').value = '';
    document.getElementById('deuda-fecha').value = '';
};

window.borrarHistorialMes = async () => {

    const mes = parseInt(document.getElementById('mes-borrar').value);
    const anio = parseInt(document.getElementById('anio-borrar').value);

    if(isNaN(anio)) return alert("Ingresa un año");

    const q = await getDocs(collection(db, "movimientos"));

    q.forEach(async (d) => {

        const data = d.data();

        if(!data.fecha) return;

        const fecha = new Date(data.fecha);

        if(
            fecha.getMonth() === mes &&
            fecha.getFullYear() === anio
        ) {
            await deleteDoc(doc(db, "movimientos", d.id));
        }

    });

    alert("Historial del mes eliminado");
};

function renderHistorial() {

    const lista = document.getElementById('lista-historial');

    lista.innerHTML = '';

    movimientos
        .filter(m => m.usuario === usuarioActivo)
        .forEach(m => {

            lista.innerHTML += `
                <div class="glass-card p-3 flex justify-between items-center border-l-4 ${m.tipo === 'gasto' ? 'border-red-400' : 'border-green-400'}">

                    <div>
                        <p class="text-[10px] font-black uppercase">${m.detalle}</p>
                        <p class="text-[8px] opacity-40">${m.fechaLegible}</p>
                    </div>

                    <p class="font-black text-xs ${m.tipo === 'gasto' ? 'text-red-500' : 'text-green-600'}">
                        ${m.tipo === 'gasto' ? '-' : '+'}Q${m.monto.toFixed(2)}
                    </p>

                </div>
            `;

        });

}

function renderPrestamos() {

    const lista = document.getElementById('lista-deudas');

    if(!lista) return;

    lista.innerHTML = '';

    prestamos
        .filter(p => p.usuario === usuarioActivo && !p.pagado)
        .forEach(p => {

            lista.innerHTML += `
                <div class="bg-white/60 p-3 rounded-xl flex justify-between items-center">

                    <div>
                        <p class="font-black text-xs">${p.quien}</p>
                        <p class="text-[9px] opacity-50">${p.fecha}</p>
                        <p class="text-[9px] font-bold">${p.tipo === 'debemos' ? 'Debemos' : 'Nos deben'}</p>
                    </div>

                    <div class="text-right">
                        <p class="font-black text-xs">Q${p.monto}</p>
                    </div>

                </div>
            `;

        });

}

window.aplicarParche = async () => {

    const semanal = parseFloat(document.getElementById('p-sem').value) || 0;
    const ahorro = parseFloat(document.getElementById('p-aho').value) || 0;

    await updateDoc(doc(db, 'usuario', usuarioActivo), {
        semanal,
        ahorro
    });

    alert('Parche aplicado');

};

// CALCULADORA
const calcGrid = document.getElementById('calc-grid');
const calcRes = document.getElementById('calc-res');
const calcHistory = document.getElementById('calc-history');

const keys = [
    'C','DEL','%','/',
    '7','8','9','*',
    '4','5','6','-',
    '1','2','3','+',
    '0','.','='
];

let cur = '';
let historialCalc = [];

keys.forEach(k => {

    const b = document.createElement('button');

    b.innerText = k;
    b.className = 'calc-btn';

    if(k === '=') {
        b.style.background = 'var(--accent)';
        b.style.color = 'white';
    }

    b.onclick = () => {

        if(k === 'C') {
            cur = '';
        }

        else if(k === 'DEL') {
            cur = cur.slice(0, -1);
        }

        else if(k === '=') {

            try {

                const resultado = Function(`return ${cur}`)();

                historialCalc.unshift(`${cur} = ${resultado}`);

                historialCalc = historialCalc.slice(0, 10);

                renderCalcHistory();

                cur = resultado.toString();

            } catch {
                cur = 'Error';
            }

        }

        else {
            cur += k;
        }

        calcRes.innerText = cur || '0';

    };

    calcGrid.appendChild(b);

});

function renderCalcHistory() {

    calcHistory.innerHTML = '';

    historialCalc.forEach(h => {
        calcHistory.innerHTML += `
            <div class="bg-white/60 rounded-xl p-2 text-xs font-bold">
                ${h}
            </div>
        `;
    });

}

</script>
