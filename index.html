<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DuoFinanzas Pro: Digital Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Paleta de Colores Inmersiva */
        body.theme-roger { background-color: #e0f2fe; --accent-color: #3b82f6; }
        body.theme-marian { background-color: #fce7f3; --accent-color: #ec4899; }
        body.theme-negocio { background-color: #d1fae5; --accent-color: #10b981; }

        body { transition: background-color 0.5s ease; font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.4); }
        .digital-clock { font-family: 'Courier New', Courier, monospace; letter-spacing: -1px; }
        
        .btn-quick { transition: transform 0.1s; border: 1px solid rgba(0,0,0,0.05); background: white; }
        .btn-quick:active { transform: scale(0.95); background: #f9fafb; }
        
        summary { list-style: none; }
        summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="theme-roger">

    <header class="p-6 flex flex-col items-center gap-4">
        <div class="text-center">
            <div id="clock" class="digital-clock text-4xl font-black text-gray-800 drop-shadow-sm">00:00:00</div>
            <div id="date" class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mt-1">CARGANDO...</div>
        </div>

        <div class="flex gap-4 bg-white/40 p-2 rounded-full border border-white/50">
            <button onclick="switchUser('roger')" class="w-12 h-12 rounded-full bg-blue-500 text-white font-black shadow-lg shadow-blue-200 flex items-center justify-center">R</button>
            <button onclick="switchUser('marian')" class="w-12 h-12 rounded-full bg-pink-500 text-white font-black shadow-lg shadow-pink-200 flex items-center justify-center">M</button>
            <button onclick="switchUser('negocio')" class="w-12 h-12 rounded-full bg-emerald-500 text-white font-black shadow-lg shadow-emerald-200 flex items-center justify-center">N</button>
        </div>
        <h1 id="txt-usuario" class="text-xs font-black uppercase text-gray-400 tracking-widest">Perfil: Roger</h1>
    </header>

    <main id="view-home" class="view active max-w-md mx-auto p-4 space-y-6">
        
        <div class="glass-card p-8 shadow-xl text-center">
            <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Disponible Semanal</p>
            <h2 id="val-semanal" class="text-5xl font-black text-gray-800">Q0.00</h2>
            <div class="flex justify-between mt-8 border-t border-gray-200/50 pt-4">
                <div>
                    <p class="text-[9px] font-bold text-gray-400 uppercase">Ahorro</p>
                    <p id="val-ahorro" class="font-black text-gray-700">Q0.00</p>
                </div>
                <div>
                    <p class="text-[9px] font-bold text-gray-400 uppercase">Gastos Hoy</p>
                    <p id="val-hoy" class="font-black text-red-500">Q0.00</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="quickAdd(2, 'Viaje Transmetro')" class="btn-quick p-4 rounded-2xl flex flex-col items-center shadow-sm">
                <span class="text-2xl mb-1">🚇</span>
                <span class="text-[10px] font-black text-gray-500 uppercase">Viaje Q2</span>
            </button>
            <button onclick="quickAdd(5, 'Recarga Tarjeta')" class="btn-quick p-4 rounded-2xl flex flex-col items-center shadow-sm">
                <span class="text-2xl mb-1">💳</span>
                <span class="text-[10px] font-black text-gray-500 uppercase">Recarga Q5</span>
            </button>
            <button id="btn-bus-roger" onclick="quickAdd(7, 'Bus Diario')" class="btn-quick p-4 rounded-2xl flex flex-col items-center shadow-sm col-span-2">
                <span class="text-2xl mb-1">🚌</span>
                <span class="text-[10px] font-black text-gray-500 uppercase">Gasto Bus (Q7)</span>
            </button>
        </div>

        <div class="space-y-3">
            <details class="glass-card group overflow-hidden">
                <summary class="p-4 font-black text-sm flex justify-between items-center cursor-pointer">
                    <span>✨ OTROS MOVIMIENTOS</span>
                    <i class="fa-solid fa-plus text-[10px] transition-transform group-open:rotate-45"></i>
                </summary>
                <div class="p-4 pt-0 space-y-4">
                    <input type="number" id="in-monto" placeholder="Q 0.00" class="w-full text-3xl font-black text-center bg-transparent border-b-2 border-gray-300 outline-none">
                    <select id="in-tipo" class="w-full p-3 rounded-xl bg-white/50 font-bold text-xs uppercase">
                        <option value="gasto_semanal">➖ Quitar de Semanal</option>
                        <option value="ingreso_semanal">➕ Meter a Semanal</option>
                        <option value="ingreso_ahorro">💰 Ahorrar Dinero</option>
                        <option value="gasto_ahorro">💸 Sacar de Ahorro</option>
                    </select>
                    <input type="text" id="in-nota" placeholder="¿Qué compraste?" class="w-full p-3 rounded-xl bg-white/50 text-sm outline-none">
                    <button onclick="execTrans()" class="w-full bg-gray-800 text-white py-4 rounded-xl font-bold shadow-lg">GUARDAR</button>
                </div>
            </details>

            <details class="glass-card group overflow-hidden">
                <summary class="p-4 font-black text-sm flex justify-between items-center cursor-pointer">
                    <span>🤝 DEUDAS Y PRESTAMOS</span>
                    <i class="fa-solid fa-hand-holding-dollar text-[10px]"></i>
                </summary>
                <div class="p-4 pt-0 space-y-3">
                    <div class="flex gap-2">
                        <input type="text" id="d-nom" placeholder="Nombre" class="w-2/3 p-3 rounded-xl bg-white/50 text-sm">
                        <input type="number" id="d-mon" placeholder="Q" class="w-1/3 p-3 rounded-xl bg-white/50 text-sm">
                    </div>
                    <button onclick="addDeuda()" class="w-full bg-white text-gray-800 py-3 rounded-xl font-black text-xs border border-gray-200">ANOTAR EN LISTA</button>
                    <div id="list-deudas" class="space-y-2 mt-4"></div>
                </div>
            </details>
        </div>
    </main>

    <main id="view-calc" class="view max-w-md mx-auto p-4">
        <div class="glass-card p-6 shadow-xl">
            <div class="bg-black/5 p-6 rounded-2xl text-right mb-4">
                <div id="calc-res" class="text-4xl font-black text-gray-800 digital-clock">0</div>
            </div>
            <div class="grid grid-cols-4 gap-2" id="calc-grid"></div>
        </div>
    </main>

    <main id="view-hist" class="view max-w-md mx-auto p-4">
        <h2 class="text-2xl font-black text-gray-800 mb-6 flex justify-between items-center">
            Historial <button onclick="clearHist()" class="text-[9px] bg-red-100 text-red-500 px-2 py-1 rounded">BORRAR</button>
        </h2>
        <div id="list-historial" class="space-y-3"></div>
    </main>

    <main id="view-patch" class="view max-w-md mx-auto p-4">
        <div class="glass-card p-6 border-2 border-red-200">
            <h2 class="text-xl font-black text-red-600 mb-4 italic">Corregir Base de Datos</h2>
            <div class="space-y-4">
                <div><label class="text-[9px] font-black text-gray-400 ml-1">NUEVO SEMANAL</label><input type="number" id="p-sem" class="w-full p-4 rounded-2xl bg-white/50 font-black text-xl"></div>
                <div><label class="text-[9px] font-black text-gray-400 ml-1">NUEVO AHORRO</label><input type="number" id="p-aho" class="w-full p-4 rounded-2xl bg-white/50 font-black text-xl"></div>
                <div><label class="text-[9px] font-black text-gray-400 ml-1">NUEVO GASTO HOY</label><input type="number" id="p-hoy" class="w-full p-4 rounded-2xl bg-white/50 font-black text-xl"></div>
                <button onclick="savePatch()" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black">SOBRESCRIBIR TODO</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t flex justify-around p-4 z-50">
        <button onclick="showView('home')" class="flex flex-col items-center text-gray-400 hover:text-gray-900">
            <i class="fa-solid fa-wallet text-xl"></i><span class="text-[8px] font-black mt-1">INICIO</span>
        </button>
        <button onclick="showView('calc')" class="flex flex-col items-center text-gray-400 hover:text-gray-900">
            <i class="fa-solid fa-calculator text-xl"></i><span class="text-[8px] font-black mt-1">CALC</span>
        </button>
        <button onclick="showView('hist')" class="flex flex-col items-center text-gray-400 hover:text-gray-900">
            <i class="fa-solid fa-clock-rotate-left text-xl"></i><span class="text-[8px] font-black mt-1">LOGS</span>
        </button>
        <button onclick="showView('patch')" class="flex flex-col items-center text-gray-400 hover:text-gray-900">
            <i class="fa-solid fa-gears text-xl"></i><span class="text-[8px] font-black mt-1">PATCH</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, addDoc, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrpGejWy2Xstf_KiqkNSlfknl3HaBhyyE",
            authDomain: "finanzas-3e70d.firebaseapp.com",
            projectId: "finanzas-3e70d",
            storageBucket: "finanzas-3e70d.firebasestorage.app",
            messagingSenderId: "125350113957",
            appId: "1:125350113957:web:16e676cc72327bb158934c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentUser = 'roger';
        let userData = {};

        // RELOJ DIGITAL
        setInterval(() => {
            const n = new Date();
            document.getElementById('clock').innerText = n.toLocaleTimeString('en-GB');
            document.getElementById('date').innerText = n.toLocaleDateString('es-GT', { weekday:'long', day:'numeric', month:'short' });
        }, 1000);

        // NAVEGACIÓN Y PERFIL
        window.switchUser = (u) => {
            currentUser = u;
            document.body.className = `theme-${u}`;
            document.getElementById('txt-usuario').innerText = `Perfil: ${u.toUpperCase()}`;
            document.getElementById('btn-bus-roger').style.display = (u === 'marian') ? 'none' : 'flex';
            renderUI();
        };

        window.showView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active');
        };

        // FIREBASE SYNC
        ['roger', 'marian', 'negocio'].forEach(u => {
            onSnapshot(doc(db, "usuario", u), (s) => {
                if(s.exists()) {
                    userData[u] = s.data();
                    if(u === currentUser) renderUI();
                }
            });
        });

        function renderUI() {
            const d = userData[currentUser];
            if(!d) return;
            document.getElementById('val-semanal').innerText = `Q${d.semanal.toFixed(2)}`;
            document.getElementById('val-ahorro').innerText = `Q${d.ahorro.toFixed(2)}`;
            document.getElementById('val-hoy').innerText = `Q${d.gastosHoy.toFixed(2)}`;
            
            document.getElementById('p-sem').value = d.semanal;
            document.getElementById('p-aho').value = d.ahorro;
            document.getElementById('p-hoy').value = d.gastosHoy;
            
            fetchHistory();
            fetchDeudas();
        }

        // ACCIONES RÁPIDAS
        window.quickAdd = async (monto, desc) => {
            await updateDoc(doc(db, "usuario", currentUser), { semanal: increment(-monto), gastosHoy: increment(monto) });
            await addDoc(collection(db, "movimientos"), {
                u: currentUser, tipo: 'gasto', m: monto, nota: desc, c: 'SEMANAL', t: new Date().toISOString()
            });
        };

        window.execTrans = async () => {
            const m = parseFloat(document.getElementById('in-monto').value);
            const t = document.getElementById('in-tipo').value;
            const n = document.getElementById('in-nota').value || "Sin nota";
            if(!m) return;

            let upd = {};
            if(t === 'gasto_semanal') upd = { semanal: increment(-m), gastosHoy: increment(m) };
            if(t === 'ingreso_semanal') upd = { semanal: increment(m) };
            if(t === 'ingreso_ahorro') upd = { ahorro: increment(m) };
            if(t === 'gasto_ahorro') upd = { ahorro: increment(-m) };

            await updateDoc(doc(db, "usuario", currentUser), upd);
            await addDoc(collection(db, "movimientos"), {
                u: currentUser, tipo: t.includes('gasto')?'gasto':'ingreso', m, nota: n, c: t.includes('semanal')?'SEMANAL':'AHORRO', t: new Date().toISOString()
            });
            document.getElementById('in-monto').value = "";
        };

        // DEUDAS
        window.addDeuda = async () => {
            const n = document.getElementById('d-nom').value;
            const m = parseFloat(document.getElementById('d-mon').value);
            if(!n || !m) return;
            await addDoc(collection(db, "prestamos"), { u: currentUser, nom: n, m, p: false, t: new Date().toLocaleDateString() });
            document.getElementById('d-nom').value = ""; document.getElementById('d-mon').value = "";
        };

        function fetchDeudas() {
            onSnapshot(collection(db, "prestamos"), (s) => {
                const l = document.getElementById('list-deudas'); l.innerHTML = "";
                s.docs.forEach(docSnap => {
                    const d = docSnap.data();
                    if(d.u === currentUser && !d.p) {
                        l.innerHTML += `<div class="bg-white/50 p-3 rounded-xl flex justify-between items-center text-xs">
                            <span><b>${d.nom}</b> - Q${d.m}</span>
                            <button onclick="payDeuda('${docSnap.id}', ${d.m})" class="bg-gray-800 text-white px-3 py-1 rounded-lg">PAGADO</button>
                        </div>`;
                    }
                });
            });
        }

        window.payDeuda = async (id, m) => {
            await updateDoc(doc(db, "prestamos", id), { p: true });
            await updateDoc(doc(db, "usuario", currentUser), { semanal: increment(-m), gastosHoy: increment(m) });
        };

        // HISTORIAL
        function fetchHistory() {
            const q = query(collection(db, "movimientos"), orderBy("t", "desc"), limit(15));
            onSnapshot(q, (s) => {
                const l = document.getElementById('list-historial'); l.innerHTML = "";
                s.docs.forEach(docSnap => {
                    const h = docSnap.data();
                    if(h.u !== currentUser) return;
                    l.innerHTML += `<div class="bg-white/40 p-4 rounded-2xl flex justify-between items-center border border-white/50">
                        <div><p class="text-xs font-black">${h.nota}</p><p class="text-[9px] opacity-40 uppercase">${h.c}</p></div>
                        <p class="font-black ${h.tipo==='gasto'?'text-red-500':'text-green-600'}">${h.tipo==='gasto'?'-':'+'} Q${h.m}</p>
                    </div>`;
                });
            });
        }

        window.savePatch = async () => {
            const s = parseFloat(document.getElementById('p-sem').value);
            const a = parseFloat(document.getElementById('p-aho').value);
            const h = parseFloat(document.getElementById('p-hoy').value);
            await updateDoc(doc(db, "usuario", currentUser), { semanal: s, ahorro: a, gastosHoy: h });
            alert("Base de datos sobrescrita.");
        };

        // CALCULADORA
        const cG = document.getElementById('calc-grid');
        ["C","DEL","%","/","7","8","9","*","4","5","6","-","1","2","3","+","0",".","(",")","="].forEach(t => {
            const b = document.createElement('button');
            b.innerText = t;
            b.className = "p-4 bg-white/50 rounded-xl font-bold text-lg active:bg-white";
            if(t === "=") b.className = "p-4 bg-gray-800 text-white rounded-xl font-bold col-span-2";
            b.onclick = () => {
                const res = document.getElementById('calc-res');
                if(t === "C") res.innerText = "0";
                else if(t === "DEL") res.innerText = res.innerText.slice(0,-1) || "0";
                else if(t === "=") { try { res.innerText = eval(res.innerText); } catch { res.innerText = "Error"; } }
                else { res.innerText = res.innerText === "0" ? t : res.innerText + t; }
            };
            cG.appendChild(b);
        });

    </script>
</body>
</html>
