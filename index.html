<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DuoFinanzas Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.4s ease; padding-top: 100px; padding-bottom: 110px; }
        .theme-roger { background-color: #e0f2fe; --accent: #3b82f6; }
        .theme-marian { background-color: #fdf2f8; --accent: #ec4899; }
        .theme-negocio { background-color: #fef9c3; --accent: #eab308; }
        .nav-fixed-top { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .digital-clock { font-family: 'JetBrains Mono', monospace; background: white; color: var(--accent); padding: 5px 12px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; border: 2px solid var(--accent); }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 20px rgba(0,0,0,0.03); }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        details summary { list-style: none; outline: none; }
    </style>
</head>
<body class="theme-roger">

    <header class="nav-fixed-top p-3 flex justify-between items-center">
        <div class="flex flex-col">
            <div id="reloj-digital" class="digital-clock">00:00:00 AM</div>
            <p id="fecha-actual" class="text-[9px] font-black uppercase mt-1 opacity-60"></p>
        </div>
        <div class="flex gap-2 bg-white/50 p-1 rounded-full shadow-inner border">
            <button onclick="cambiarUsuario('roger')" class="w-10 h-10 rounded-full bg-blue-500 text-white font-black border-2 border-white shadow-md">R</button>
            <button onclick="cambiarUsuario('marian')" class="w-10 h-10 rounded-full bg-pink-500 text-white font-black border-2 border-white shadow-md">M</button>
            <button onclick="cambiarUsuario('negocio')" class="w-10 h-10 rounded-full bg-yellow-500 text-white font-black border-2 border-white shadow-md">N</button>
        </div>
    </header>

    <main id="view-home" class="view active max-w-md mx-auto p-4 space-y-4">
        
        <div class="grid grid-cols-2 gap-3" id="accesos-rapidos">
            <button onclick="accionRapida(2, '🚇 Directo Q2')" class="glass-card p-4 flex flex-col items-center active:scale-95 transition-all">
                <span class="text-xl">🚇</span><span class="text-[10px] font-black uppercase mt-1 italic">Directo Q2</span>
            </button>
            <button onclick="accionRapida(5, '💳 Recarga Q5')" class="glass-card p-4 flex flex-col items-center active:scale-95 transition-all">
                <span class="text-xl">💳</span><span class="text-[10px] font-black uppercase mt-1 italic">Recarga Q5</span>
            </button>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="glass-card p-5 border-l-4 border-blue-400">
                <p class="text-[9px] font-bold opacity-50 uppercase">Semanal / Caja</p>
                <h2 id="saldo-semanal" class="text-2xl font-black tracking-tight">Q0.00</h2>
            </div>
            <div class="glass-card p-5 border-l-4 border-indigo-400">
                <p class="text-[9px] font-bold opacity-50 uppercase">Ahorro</p>
                <h2 id="saldo-ahorro" class="text-2xl font-black">Q0.00</h2>
            </div>
        </div>

        <div id="modulo-transporte" class="glass-card p-5 space-y-4">
            <div id="seccion-pasajes">
                <h3 class="font-bold mb-3 text-[10px] uppercase opacity-40">Calculador de Pasajes</h3>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <input type="number" id="p-bus" placeholder="Bus Q" class="p-3 rounded-xl bg-white text-sm outline-none">
                    <input type="number" id="p-trans" placeholder="Trans Q" class="p-3 rounded-xl bg-white text-sm outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="calcPasaje(1)" class="bg-white py-3 rounded-xl font-bold text-[10px] shadow-sm">IDA O VUELTA</button>
                    <button onclick="calcPasaje(2)" class="bg-black/5 py-3 rounded-xl font-bold text-[10px]">AMBOS (X2)</button>
                </div>
            </div>
            <div id="btn-acompaniar" class="pt-4 border-t border-black/5 hidden">
                <div class="flex gap-2">
                    <input type="number" id="acomp-monto" value="1" class="w-20 p-3 rounded-xl bg-indigo-50 font-black text-center outline-none">
                    <button onclick="acompaniarMarian()" class="flex-1 bg-indigo-100 text-indigo-700 py-3 rounded-xl font-black text-[10px] uppercase italic">Acompañar a Marian</button>
                </div>
            </div>
        </div>

        <details class="glass-card overflow-hidden group">
            <summary class="p-5 font-black text-xs flex justify-between items-center cursor-pointer uppercase tracking-widest">
                <span><i class="fa-solid fa-circle-plus mr-2"></i> Movimiento Manual</span>
                <i class="fa-solid fa-chevron-down text-[10px] transition-transform group-open:rotate-180"></i>
            </summary>
            <div class="p-5 pt-0 space-y-3">
                <input type="number" id="monto-m" placeholder="Q 0.00" class="w-full text-4xl font-black text-center bg-transparent border-b-2 border-black/10 outline-none pb-2">
                <select id="tipo-m" class="w-full p-3 rounded-2xl bg-white font-bold text-[10px] uppercase border-none">
                    <option value="gasto_semanal">➖ Gasto de Semanal</option>
                    <option value="ingreso_semanal">➕ Ingreso a Semanal</option>
                    <option value="ingreso_ahorro">💰 Meter a Ahorro</option>
                    <option value="gasto_ahorro">💸 Sacar de Ahorro</option>
                </select>
                <input type="text" id="nota-m" placeholder="Detalle (opcional)" class="w-full p-3 rounded-2xl bg-white text-xs outline-none">
                <button onclick="guardarManual()" class="w-full py-4 rounded-2xl font-black text-white bg-black shadow-lg active:scale-95 transition-all">REGISTRAR MOVIMIENTO</button>
            </div>
        </details>

        <div class="glass-card p-5">
            <h3 class="font-black text-[10px] uppercase opacity-40 mb-4 text-center tracking-widest">Sistema de Préstamos</h3>
            <div class="space-y-2 mb-4">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="d-quien" placeholder="¿Quién?" class="p-3 rounded-xl bg-white text-xs outline-none">
                    <input type="number" id="d-cuanto" placeholder="Monto Q" class="p-3 rounded-xl bg-white text-xs outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="d-fecha" class="p-3 rounded-xl bg-white text-[10px] outline-none">
                    <select id="d-tipo" class="p-3 rounded-xl bg-white text-[10px] font-black uppercase">
                        <option value="medeben">Me deben (Entrada)</option>
                        <option value="debo">Yo debo (Salida)</option>
                    </select>
                </div>
                <button onclick="nuevaDeuda()" class="w-full bg-white border border-black/10 py-3 rounded-xl font-black text-[10px] uppercase shadow-sm">Anotar Préstamo Real</button>
            </div>
            <div id="lista-deudas" class="space-y-2"></div>
        </div>
    </main>

    <main id="view-calc" class="view max-w-md mx-auto p-4">
        <div class="glass-card p-6">
            <div id="calc-history-list" class="text-right text-[10px] opacity-40 font-mono mb-2 space-y-1"></div>
            <div class="bg-white border-2 border-black/5 p-6 rounded-3xl text-right mb-4 shadow-inner">
                <h2 id="calc-res" class="text-4xl font-black">0</h2>
            </div>
            <div class="grid grid-cols-4 gap-2" id="calc-grid"></div>
        </div>
    </main>

    <main id="view-hist" class="view max-w-md mx-auto p-4">
        <h2 class="text-center font-black uppercase text-xs mb-4 opacity-50 tracking-widest">Historial Inalterable</h2>
        <div id="lista-historial" class="space-y-2"></div>
    </main>

    <main id="view-patch" class="view max-w-md mx-auto p-4">
        <div class="glass-card p-6 space-y-6">
            <h2 class="text-xl font-black text-red-600 uppercase italic text-center">⚙️ Panel de Control</h2>
            <div class="space-y-3">
                <div><label class="text-[9px] font-bold ml-2">CORREGIR SEMANAL</label><input type="number" id="p-sem" class="w-full p-4 rounded-2xl bg-white border-none shadow-inner font-bold outline-none"></div>
                <div><label class="text-[9px] font-bold ml-2">CORREGIR AHORRO</label><input type="number" id="p-aho" class="w-full p-4 rounded-2xl bg-white border-none shadow-inner font-bold outline-none"></div>
                <button onclick="aplicarParche()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">SOBRESCRIBIR TODO</button>
            </div>
            <button onclick="limpiarHistorial()" class="w-full text-red-500 font-bold text-[10px] mt-20 uppercase tracking-widest">Limpiar registros de historial</button>
        </div>
    </main>

    <nav class="fixed bottom-4 left-4 right-4 glass-card p-3 flex justify-around items-center z-50 shadow-2xl">
        <button onclick="ver('home')" class="p-2 transition-transform active:scale-125"><i class="fa-solid fa-house text-xl"></i></button>
        <button onclick="ver('calc')" class="p-2 transition-transform active:scale-125"><i class="fa-solid fa-calculator text-xl"></i></button>
        <button onclick="ver('hist')" class="p-2 transition-transform active:scale-125"><i class="fa-solid fa-receipt text-xl"></i></button>
        <button onclick="ver('patch')" class="p-2 transition-transform active:scale-125"><i class="fa-solid fa-wrench text-xl"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, addDoc, collection, query, orderBy, limit, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrpGejWy2Xstf_KiqkNSlfknl3HaBhyyE",
            authDomain: "finanzas-3e70d.firebaseapp.com",
            projectId: "finanzas-3e70d",
            storageBucket: "finanzas-3e70d.firebasestorage.app",
            messagingSenderId: "125350113957",
            appId: "1:125350113957:web:16e676cc72327bb158934c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let user = 'roger';
        let localData = {};
        let calcHistory = [];

        // RELOJ 12H
        setInterval(() => {
            const n = new Date();
            document.getElementById('reloj-digital').innerText = n.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
            document.getElementById('fecha-actual').innerText = n.toLocaleDateString('es-GT', { weekday: 'long', day: 'numeric', month: 'short' });
        }, 1000);

        window.cambiarUsuario = (u) => {
            user = u;
            document.body.className = `theme-${u}`;
            document.getElementById('btn-acompaniar').classList.toggle('hidden', u !== 'roger');
            document.getElementById('modulo-transporte').classList.toggle('hidden', u === 'negocio');
            document.getElementById('accesos-rapidos').classList.toggle('hidden', u === 'negocio');
            render();
        };

        window.ver = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active');
        };

        // Escuchar cambios de saldos (Sync Real)
        ['roger', 'marian', 'negocio'].forEach(u => {
            onSnapshot(doc(db, "usuario", u), (s) => {
                if(s.exists()) {
                    localData[u] = s.data();
                    if(u === user) render();
                }
            });
        });

        function render() {
            const d = localData[user] || { semanal: 0, ahorro: 0 };
            document.getElementById('saldo-semanal').innerText = `Q${(d.semanal || 0).toFixed(2)}`;
            document.getElementById('saldo-ahorro').innerText = `Q${(d.ahorro || 0).toFixed(2)}`;
            document.getElementById('p-sem').value = d.semanal || 0;
            document.getElementById('p-aho').value = d.ahorro || 0;
            updateHistorial();
            updateDeudas();
        }

        async function log(tipo, m, nota, cuenta) {
            await addDoc(collection(db, "movimientos"), {
                u: user, tipo, m: parseFloat(m), nota: nota || 'Gasto vario', cuenta, 
                fecha: new Date().toISOString(),
                hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
        }

        window.accionRapida = async (m, nota) => {
            await updateDoc(doc(db, "usuario", user), { semanal: increment(-m) });
            await log('gasto', m, nota, 'SEMANAL');
        };

        window.calcPasaje = async (mult) => {
            const b = parseFloat(document.getElementById('p-bus').value) || 0;
            const t = parseFloat(document.getElementById('p-trans').value) || 0;
            const total = (b + t) * mult;
            if(total <= 0) return;
            await updateDoc(doc(db, "usuario", user), { semanal: increment(-total) });
            await log('gasto', total, `Pasaje (${mult}x)`, 'SEMANAL');
            document.getElementById('p-bus').value = ""; document.getElementById('p-trans').value = "";
        };

        window.acompaniarMarian = async () => {
            const monto = parseFloat(document.getElementById('acomp-monto').value) || 1;
            await updateDoc(doc(db, "usuario", "roger"), { semanal: increment(-monto) });
            await updateDoc(doc(db, "usuario", "marian"), { semanal: increment(-monto) });
            await addDoc(collection(db, "movimientos"), { u: "roger", tipo: 'gasto', m: monto, nota: "Acompañó a Marian", cuenta: 'SEMANAL', fecha: new Date().toISOString() });
            await addDoc(collection(db, "movimientos"), { u: "marian", tipo: 'gasto', m: monto, nota: "Acompañada por Roger", cuenta: 'SEMANAL', fecha: new Date().toISOString() });
            alert(`Saldado Q${monto} a ambos`);
        };

        window.guardarManual = async () => {
            const m = parseFloat(document.getElementById('monto-m').value);
            const t = document.getElementById('tipo-m').value;
            const n = document.getElementById('nota-m').value;
            if(!m) return;
            
            let upd = {};
            if(t==='gasto_semanal') upd = { semanal: increment(-m) };
            else if(t==='ingreso_semanal') upd = { semanal: increment(m) };
            else if(t==='ingreso_ahorro') upd = { ahorro: increment(m) };
            else if(t==='gasto_ahorro') upd = { ahorro: increment(-m) };

            await updateDoc(doc(db, "usuario", user), upd);
            await log(t.includes('gasto')?'gasto':'ingreso', m, n, t.split('_')[1].toUpperCase());
            document.getElementById('monto-m').value = ""; document.getElementById('nota-m').value = "";
        };

        // LÓGICA DE PRÉSTAMOS REALES
        window.nuevaDeuda = async () => {
            const q = document.getElementById('d-quien').value;
            const c = parseFloat(document.getElementById('d-cuanto').value);
            const f = document.getElementById('d-fecha').value;
            const t = document.getElementById('d-tipo').value;
            if(!q || !c || !f) return;

            // Al crear el préstamo, el dinero fluye
            if(t === 'medeben') {
                // Si me deben, significa que yo saqué dinero de mi semanal para darlo
                await updateDoc(doc(db, "usuario", user), { semanal: increment(-c) });
                await log('gasto', c, `Préstamo a ${q}`, 'SEMANAL');
            } else {
                // Si yo debo, significa que entró dinero a mi semanal de alguien más
                await updateDoc(doc(db, "usuario", user), { semanal: increment(c) });
                await log('ingreso', c, `Préstamo de ${q}`, 'SEMANAL');
            }

            await addDoc(collection(db, "prestamos"), { u: user, de: q, m: c, p: false, f, t });
            document.getElementById('d-quien').value = ""; document.getElementById('d-cuanto').value = "";
        };

        function updateDeudas() {
            onSnapshot(collection(db, "prestamos"), (s) => {
                const list = document.getElementById('lista-deudas'); list.innerHTML = "";
                s.docs.forEach(docSnap => {
                    const d = docSnap.data();
                    if(d.u === user && !d.p) {
                        const isDebo = d.t === 'debo';
                        list.innerHTML += `
                            <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-black/5 shadow-sm">
                                <div>
                                    <p class="text-[8px] font-black uppercase ${isDebo?'text-red-500':'text-blue-600'}">${isDebo?'Yo debo a':'Me debe'}</p>
                                    <p class="text-xs font-bold">${d.de}</p>
                                    <p class="text-[8px] opacity-40">${d.f}</p
