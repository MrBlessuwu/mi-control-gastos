<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');

:root {
    --accent: #3b82f6;
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: all .3s ease;
    padding-top: 100px;
    padding-bottom: 110px;
}

.theme-roger {
    background: #e0f2fe;
    --accent: #3b82f6;
}

.theme-marian {
    background: #fdf2f8;
    --accent: #ec4899;
}

.theme-negocio {
    background: #fef9c3;
    --accent: #eab308;
}

.glass-card {
    background: rgba(255,255,255,.75);
    backdrop-filter: blur(10px);
    border-radius: 2rem;
    border: 1px solid rgba(255,255,255,.5);
    box-shadow: 0 8px 20px rgba(0,0,0,.05);
}

.nav-fixed-top {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(255,255,255,.6);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,.4);
}

.digital-clock {
    font-family: 'JetBrains Mono', monospace;
    background: white;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 5px 12px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
}

.btn-main {
    background: var(--accent);
    color: white;
}

.view {
    display: none;
}

.view.active {
    display: block;
}

details summary {
    list-style: none;
}

details summary::-webkit-details-marker {
    display: none;
}

.calc-btn {
    background: rgba(255,255,255,.6);
    border-radius: 1rem;
    padding: 18px;
    font-weight: bold;
}
    /* =========================
ALERTA GATITO
========================= */

.z-calico-floof-container-999 {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.k-patched-cat-wrapper-777 {
    position: relative;
    width: 100px;
    height: 110px;
    margin-bottom: 20px;
    animation: k-gentle-float-555 1.2s infinite ease-in-out;
}

.k-patched-cat-wrapper-777::before,
.k-patched-cat-wrapper-777::after {
    content: '';
    position: absolute;
    top: 0px;
    width: 30px;
    height: 45px;
    background: #edb879;
    border-radius: 50% 50% 0 0;
    z-index: 1;
}

.k-patched-cat-wrapper-777::before {
    left: 15px;
    transform: rotate(-10deg);
}

.k-patched-cat-wrapper-777::after {
    right: 15px;
    transform: rotate(10deg);
}

.k-face-base-888 {
    position: absolute;
    width: 100%;
    height: 70px;
    background: white;
    border-radius: 35px;
    bottom: 5px;
    z-index: 2;
    overflow: hidden;
}

.k-face-base-888::before,
.k-face-base-888::after {
    content: '';
    position: absolute;
    background: #edb879;
    border-radius: 50%;
}

.k-face-base-888::before {
    width: 60px;
    height: 60px;
    top: -15px;
    right: -15px;
    opacity: .9;
}

.k-face-base-888::after {
    width: 25px;
    height: 25px;
    top: 5px;
    left: 10px;
}

.k-eye-dot-111 {
    position: absolute;
    top: 28px;
    width: 10px;
    height: 10px;
    background: #333;
    border-radius: 50%;
    animation: k-blink-000 3s infinite;
    z-index: 3;
}

.k-eye-left {
    left: 25px;
}

.k-eye-right {
    right: 25px;
}

.k-nose-tip-222 {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 5px;
    background: #ffb6c1;
    border-radius: 50%;
    z-index: 3;
}

.q-loader-track-444 {
    width: 180px;
    height: 10px;
    background: #e0e0e0;
    border-radius: 10px;
    overflow: hidden;
}

.q-loader-fill-111 {
    width: 0%;
    height: 100%;
    background: #edb879;
    border-radius: 10px;
    animation: q-zoom-load-333 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes k-gentle-float-555 {
    0%,100% {
        transform: translateY(0);
    }

    50% {
        transform: translateY(-8px);
    }
}

@keyframes k-blink-000 {
    0%,90%,100% {
        transform: scaleY(1);
    }

    95% {
        transform: scaleY(.1);
    }
}

@keyframes q-zoom-load-333 {
    0% {
        width: 0%;
        opacity: 1;
    }

    70% {
        width: 100%;
        opacity: 1;
    }

    90%,100% {
        width: 100%;
        opacity: 0;
    }
}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    doc,
    onSnapshot,
    updateDoc,
    increment,
    setDoc,
    collection,
    addDoc,
    query,
    orderBy,
    limit,
     deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBrpGejWy2Xstf_KiqkNSlfknl3HaBhyyE",
    authDomain: "finanzas-3e70d.firebaseapp.com",
    projectId: "finanzas-3e70d",
    storageBucket: "finanzas-3e70d.firebasestorage.app",
    messagingSenderId: "125350113957",
    appId: "1:125350113957:web:16e676cc72327bb158934c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let usuarioActivo = 'roger';
let datosLocales = {};
let movimientos = [];
let prestamos = [];
function mostrarMiniAlerta(texto) {

    const alerta = document.getElementById('mini-alerta');

    document.getElementById('mini-alerta-texto').innerText = texto;

    alerta.classList.remove('hidden');

    clearTimeout(window.alertaTimeout);

window.alertaTimeout = setTimeout(() => {
    alerta.classList.add('hidden');
}, 1200);
}

// RELOJ
setInterval(() => {

    const n = new Date();

    document.getElementById('reloj').innerText = n.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
    });

    document.getElementById('fecha').innerText = n.toLocaleDateString('es-GT', {
        weekday: 'long',
        day: 'numeric',
        month: 'short'
    });

}, 1000);

// USUARIOS
['roger', 'marian', 'negocio'].forEach(u => {

    onSnapshot(doc(db, 'usuario', u), snap => {

        if(snap.exists()) {
            datosLocales[u] = snap.data();
            if(u === usuarioActivo) render();
        } else {
            setDoc(doc(db, 'usuario', u), {
                semanal: 0,
                ahorro: 0,
                gastosHoy: 0
            });
        }

    });

});

// MOVIMIENTOS
const qMov = query(collection(db, 'movimientos'), orderBy('fechaIso', 'desc'), limit(50));

onSnapshot(qMov, snap => {
    movimientos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderHistorial();
});

// PRESTAMOS
onSnapshot(collection(db, 'prestamos'), snap => {
    prestamos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderPrestamos();
});

function render() {

    const d = datosLocales[usuarioActivo] || {
        semanal: 0,
        ahorro: 0,
        gastosHoy: 0
    };

    document.getElementById('saldo-semanal').innerText = `Q${(d.semanal || 0).toFixed(2)}`;

    document.getElementById('saldo-ahorro').innerText = `Q${(d.ahorro || 0).toFixed(2)}`;

    document.getElementById('gastos-hoy').innerText = `Q${(d.gastosHoy || 0).toFixed(2)}`;

    document.getElementById('p-sem').value = d.semanal || 0;
    document.getElementById('p-aho').value = d.ahorro || 0;

    document.getElementById('titulo-perfil').innerText = `Cuentas de ${usuarioActivo}`;

    document.getElementById('hist-user').innerText = usuarioActivo;

    document.body.className = `theme-${usuarioActivo}`;

    // NEGOCIO SIN PASAJES
    document.getElementById('seccion-pasajes').style.display = usuarioActivo === 'negocio' ? 'none' : 'block';
// NEGOCIO SIN ACCESOS RAPIDOS
document.getElementById('acciones-rapidas').style.display =
usuarioActivo === 'negocio' ? 'none' : 'grid';
    // ACOMPAÑAR SOLO ROGER
    document.getElementById('bloque-acompanar').style.display = usuarioActivo === 'roger' ? 'block' : 'none';

}

window.cambiarUsuario = (u) => {
    usuarioActivo = u;
    render();
};

window.ver = (id) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${id}`).classList.add('active');
};

async function registrarHistorial(tipo, monto, detalle, cuenta) {

    await addDoc(collection(db, 'movimientos'), {
        usuario: usuarioActivo,
        tipo,
        monto,
        detalle,
        cuenta,
        fechaIso: new Date().toISOString(),
        fechaLegible: new Date().toLocaleString('es-GT')
    });

}

window.accionRapida = async (monto, detalle) => {

    await updateDoc(doc(db, 'usuario', usuarioActivo), {
    semanal,
    ahorro,
    gastosHoy: 0
});

    await registrarHistorial('gasto', monto, detalle, 'SEMANAL');
mostrarMiniAlerta(`-Q${monto} en semanal`);
};

window.calcPasaje = async (multi) => {

    const bus = parseFloat(document.getElementById('p-bus').value) || 0;
    const trans = parseFloat(document.getElementById('p-trans').value) || 0;

    const total = (bus + trans) * multi;

    if(total <= 0) return;

    await updateDoc(doc(db, 'usuario', usuarioActivo), {
        semanal: increment(-total),
        gastosHoy: increment(total)
    });

    await registrarHistorial('gasto', total, 'Pasaje', 'SEMANAL');
    mostrarMiniAlerta(`-Q${total} en pasajes`);

};

window.guardarManual = async () => {

    const monto = parseFloat(document.getElementById('monto-m').value);

    if(!monto || monto <= 0) return;

    const tipo = document.getElementById('tipo-m').value;

    const nota = document.getElementById('nota-m').value || 'Gasto vario';

    let updates = {};

    if(tipo === 'gasto_semanal') {
        updates = {
            semanal: increment(-monto),
            gastosHoy: increment(monto)
        };
    }

    else if(tipo === 'ingreso_semanal') {
        updates = {
            semanal: increment(monto)
        };
    }

    else if(tipo === 'ingreso_ahorro') {
        updates = {
            ahorro: increment(monto)
        };
    }

    else if(tipo === 'gasto_ahorro') {
        updates = {
            ahorro: increment(-monto)
        };
    }

    await updateDoc(doc(db, 'usuario', usuarioActivo), updates);

    await registrarHistorial(
        tipo.includes('gasto') ? 'gasto' : 'ingreso',
        monto,
        nota,
        tipo.split('_')[1].toUpperCase()
    );
if(tipo === 'gasto_semanal') {
    mostrarMiniAlerta(`-Q${monto} en semanal`);
}

else if(tipo === 'ingreso_semanal') {
    mostrarMiniAlerta(`+Q${monto} en semanal`);
}

else if(tipo === 'ingreso_ahorro') {
    mostrarMiniAlerta(`+Q${monto} en ahorro`);
}

else if(tipo === 'gasto_ahorro') {
    mostrarMiniAlerta(`-Q${monto} en ahorro`);
}
};

window.acompaniarMarian = async () => {

    const monto = parseFloat(document.getElementById('monto-acompanar').value);

    if(!monto || monto <= 0) {
        alert('Ingresa un monto válido');
        return;
    }

    await updateDoc(doc(db, 'usuario', 'roger'), {
        semanal: increment(-monto),
        gastosHoy: increment(monto)
    });

    await updateDoc(doc(db, 'usuario', 'marian'), {
        semanal: increment(-monto),
        gastosHoy: increment(monto)
    });

    await registrarHistorial(
        'gasto',
        monto,
        'Acompañó a Marian',
        'SEMANAL'
    );

    document.getElementById('monto-acompanar').value = '';

    alert('Registrado correctamente');

};

window.registrarPrestamo = async () => {

    const quien = document.getElementById('prestamo-quien').value;
    const monto = parseFloat(document.getElementById('prestamo-monto').value);
    const fecha = document.getElementById('prestamo-fecha').value;
    const tipo = document.getElementById('prestamo-tipo').value;
    const cuenta = document.getElementById('prestamo-cuenta').value;

    if(!quien || !monto) return;

    await addDoc(collection(db, 'prestamos'), {
        usuario: usuarioActivo,
        quien,
        monto,
        fecha,
        tipo,
        cuenta,
        pagado: false
    });

    // SI NOS PRESTAN DINERO
    if(tipo === 'debemos') {
        await updateDoc(doc(db, 'usuario', usuarioActivo), {
            [cuenta]: increment(monto)
        });
    }

};
    window.marcarPagado = async (id) => {

        pagado: true

};

// CALCULADORA
const calcGrid = document.getElementById('calc-grid');
const calcRes = document.getElementById('calc-res');
const calcHistory = document.getElementById('calc-history');

const keys = [
    'C','DEL','%','/',
    '7','8','9','*',
    '4','5','6','-',
    '1','2','3','+',
    '0','.','='
];

let cur = '';
let historialCalc = [];

keys.forEach(k => {

    const b = document.createElement('button');

    b.innerText = k;
    b.className = 'calc-btn';

    if(k === '=') {
        b.style.background = 'var(--accent)';
        b.style.color = 'white';
    }

    b.onclick = () => {

        if(k === 'C') {
            cur = '';
        }

        else if(k === 'DEL') {
            cur = cur.slice(0, -1);
        }

        else if(k === '=') {

            try {

                const resultado = Function(`return ${cur}`)();

                historialCalc.unshift(`${cur} = ${resultado}`);

                historialCalc = historialCalc.slice(0, 10);

                renderCalcHistory();

                cur = resultado.toString();

            } catch {
                cur = 'Error';
            }

        }

        else {
            cur += k;
        }

        calcRes.innerText = cur || '0';

    };

    calcGrid.appendChild(b);

});

function renderCalcHistory() {

    calcHistory.innerHTML = '';

    historialCalc.forEach(h => {
        calcHistory.innerHTML += `
            <div class="bg-white/60 rounded-xl p-2 text-xs font-bold">
                ${h}
            </div>
        `;
    });

}
